name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One concurrent deploy; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Project site lives under /<repo>/ — must match the repo name.
      NEXT_PUBLIC_BASE_PATH: /portfolio-3d
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/cache@v4
        with:
          # See here for caching with `yarn`, `bun` or other package managers https://github.com/actions/cache/blob/main/examples.md or you can leverage caching with actions/setup-node https://github.com/actions/setup-node
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-
      - run: npm ci
      # Quality gates run on the deployed code path too — ci.yml only covers
      # PRs, and a direct push to master would otherwise skip every check.
      - run: npm run lint
      - name: Typecheck
        run: npx next typegen && npx tsc --noEmit
      - name: Audit (fail on high/critical in production deps)
        run: npm audit --omit=dev --audit-level=high
      - run: npm test
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
